<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shop by Therum — Atelier cart preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap">
<style>
  :root {
    --ac:   #e83b3b;
    --ac-h: #c92e2e;
    --ac-s: rgba(232, 59, 59, 0.08);
    --sf:   #ffffff;
    --sf2:  #f7f7f6;
    --sf3:  #fafaf9;
    --bd:   rgba(0, 0, 0, 0.08);
    --bd2:  rgba(0, 0, 0, 0.16);
    --bg:   #f4f3f0;
    --tx:   #0a0a0a;
    --tx2:  #666;
    --tx3:  #999;
    --ok:   #10b981;
    --pay-bg: #1d212b;
    --pay-bg2: #262b38;
    --pay-tx: #f3f3f0;
    --pay-tx2: rgba(243,243,240,.55);
    --pay-bd: rgba(255,255,255,.08);
    --f:    -apple-system, BlinkMacSystemFont, "Inter", "Helvetica Neue", Arial, sans-serif;
    --mono: "JetBrains Mono", ui-monospace, Menlo, Consolas, monospace;
    --r:    10px;
    --r-lg: 14px;
    --e:    0.22s cubic-bezier(0.22, 0.61, 0.36, 1);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font: 14px/1.5 var(--f);
    color: var(--tx);
    background: var(--bg);
    background-image: radial-gradient(ellipse 1200px 600px at 100% 0%, rgba(232,59,59,0.04), transparent 60%);
    min-height: 100vh;
  }

  /* ── Top nav ───────────────────────────────────────────────────────── */
  .nav {
    display: flex; align-items: center; gap: 14px;
    max-width: 1280px; margin: 0 auto; padding: 24px 32px;
  }
  .brand-mark { width: 28px; height: 28px; border-radius: 7px; background: var(--ac); color: #fff;
    display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 13px; letter-spacing: -.02em; }
  .nav__brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 15px; letter-spacing: -.01em; }
  .nav__brand small { color: var(--tx3); font-weight: 500; margin-left: 6px; }
  .nav__spacer { flex: 1; }
  .nav__icon-btn {
    position: relative;
    border: 1px solid var(--bd); background: var(--sf);
    width: 38px; height: 38px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--tx); cursor: pointer;
    transition: background var(--e), border-color var(--e);
  }
  .nav__icon-btn:hover { background: var(--sf2); border-color: var(--bd2); }
  .nav__icon-btn svg { width: 16px; height: 16px; }
  .nav__badge {
    position: absolute; top: -4px; right: -4px;
    min-width: 18px; height: 18px; padding: 0 5px; border-radius: 50%;
    background: var(--ac); color: #fff;
    font: 700 10px var(--mono); font-variant-numeric: tabular-nums;
    display: inline-flex; align-items: center; justify-content: center;
  }

  /* ── Page ──────────────────────────────────────────────────────────── */
  .page { max-width: 1280px; margin: 0 auto; padding: 0 32px 60px; }
  .layout {
    display: grid;
    grid-template-columns: 1fr 440px;
    gap: 32px;
    align-items: start;
  }
  @media (max-width: 980px) { .layout { grid-template-columns: 1fr; } }

  /* ── Cart side ────────────────────────────────────────────────────── */
  .cart-side {
    background: var(--sf);
    border: 1px solid var(--bd);
    border-radius: var(--r-lg);
    padding: 30px 36px 24px;
    min-height: 600px;
    display: flex; flex-direction: column;
  }
  .cart-side__head {
    margin-bottom: 22px;
  }
  .cart-side__head h1 {
    margin: 0; font-size: 22px; font-weight: 700; letter-spacing: -.01em;
  }
  .cart-side__meta {
    margin-top: 4px;
    font: 500 11px var(--mono); color: var(--tx3);
    letter-spacing: .04em; text-transform: uppercase;
  }

  .lines { display: flex; flex-direction: column; flex: 1; }
  .line {
    display: grid;
    grid-template-columns: 64px 1fr auto 100px 36px;
    column-gap: 18px;
    align-items: center;
    padding: 16px 0;
    border-bottom: 1px solid var(--bd);
  }
  .line:last-of-type { border-bottom: 0; }

  .line__image {
    width: 64px; height: 64px;
    border-radius: 50%;
    background: var(--sf2);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    overflow: hidden;
    box-shadow: 0 6px 18px rgba(0,0,0,.06);
  }
  .line__info { min-width: 0; display: flex; flex-direction: column; gap: 2px; }
  .line__title { font-size: 14px; font-weight: 700; line-height: 1.25; letter-spacing: -.005em; }
  .line__sku   { font: 500 11px var(--mono); color: var(--tx3); letter-spacing: .02em; }

  .qty {
    display: inline-flex; align-items: center;
    background: transparent;
    border-radius: 999px;
  }
  .qty__btn {
    width: 28px; height: 28px; border-radius: 50%;
    border: 0; background: transparent;
    color: var(--tx2); cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    transition: color var(--e), background var(--e);
  }
  .qty__btn:hover { color: var(--ac); background: var(--ac-s); }
  .qty__btn svg  { width: 12px; height: 12px; }
  .qty__val {
    min-width: 38px; height: 32px;
    margin: 0 4px;
    border: 1px solid var(--bd);
    border-radius: 8px;
    display: inline-flex; align-items: center; justify-content: center;
    font: 600 13px var(--mono); font-variant-numeric: tabular-nums;
    color: var(--tx);
  }

  .line__price {
    text-align: right;
    font: 700 15px var(--f);
    font-variant-numeric: tabular-nums;
  }
  .line__price-dollar { font-size: 10px; vertical-align: super; opacity: 0.65; margin-right: 1px; }

  .line__remove {
    border: 0; background: transparent; cursor: pointer;
    width: 32px; height: 32px; border-radius: 50%;
    color: var(--tx3);
    display: inline-flex; align-items: center; justify-content: center;
    transition: background var(--e), color var(--e);
    justify-self: end;
  }
  .line__remove:hover { background: var(--sf2); color: var(--ac); }
  .line__remove svg { width: 14px; height: 14px; }

  .cart-side__foot {
    margin-top: 22px;
    padding-top: 18px;
    border-top: 1px solid var(--bd);
    display: flex; align-items: center; justify-content: space-between;
  }
  .continue {
    border: 0; background: transparent;
    cursor: pointer; padding: 0;
    display: inline-flex; align-items: center; gap: 8px;
    font: 600 13px var(--f); color: var(--ac);
    transition: color var(--e);
  }
  .continue:hover { color: var(--ac-h); }
  .continue svg { width: 14px; height: 14px; }
  .subtotal {
    font-size: 13px; color: var(--tx2);
    display: inline-flex; align-items: baseline; gap: 10px;
  }
  .subtotal__value {
    font: 700 22px var(--f); color: var(--tx);
    font-variant-numeric: tabular-nums;
  }
  .subtotal__value .dollar { font-size: 12px; vertical-align: super; opacity: 0.65; margin-right: 1px; }

  /* ── Payment side ─────────────────────────────────────────────────── */
  .pay-side {
    background: var(--pay-bg);
    color: var(--pay-tx);
    border-radius: var(--r-lg);
    padding: 30px 32px 32px;
    position: sticky; top: 24px;
    box-shadow: 0 30px 60px -20px rgba(0,0,0,.18);
  }
  .pay-side h2 {
    margin: 0 0 22px;
    font-size: 18px; font-weight: 700; letter-spacing: -.005em;
    color: var(--pay-tx);
  }

  /* Mock card preview — overlapping like reference */
  .card-mock {
    background: linear-gradient(135deg, #2a2f3c, #1d212b 65%, var(--ac));
    color: #fff;
    border-radius: 12px;
    padding: 18px 20px 14px;
    margin: 0 0 -28px 0;
    margin-left: -8px;
    font-family: var(--mono);
    position: relative;
    box-shadow: 0 18px 36px rgba(0,0,0,.32), 0 0 0 1px rgba(255,255,255,.04) inset;
    z-index: 2;
    width: 88%;
  }
  .card-mock__brand {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 22px;
  }
  .card-mock__brand-name {
    font: 700 14px var(--f); letter-spacing: .04em;
  }
  .card-mock__brand-chip {
    display: inline-flex; align-items: center; gap: -6px;
  }
  .card-mock__brand-chip > div {
    width: 18px; height: 18px; border-radius: 50%;
    margin-left: -6px;
  }
  .card-mock__brand-chip > .red    { background: #eb001b; }
  .card-mock__brand-chip > .yellow { background: #f79e1b; opacity: .9; mix-blend-mode: screen; }

  .card-mock__num {
    font-size: 14px; letter-spacing: .14em;
    margin-bottom: 16px;
    opacity: 0.85;
  }
  .card-mock__row {
    display: flex; justify-content: space-between;
    font-size: 12px;
    color: rgba(255,255,255,.85);
    font-family: var(--f); font-weight: 600;
  }
  .card-mock__exp {
    font-family: var(--mono); font-weight: 500;
    opacity: 0.75;
  }

  /* Fields */
  .pay-fields {
    display: flex; flex-direction: column; gap: 16px;
    padding-top: 38px;
  }
  .pay-field {
    display: flex; flex-direction: column; gap: 6px;
  }
  .pay-field__label {
    font: 500 11px var(--f);
    letter-spacing: .04em;
    color: var(--pay-tx2);
  }
  .pay-field__input {
    height: 40px;
    background: transparent;
    border: 0; border-bottom: 1px solid var(--pay-bd);
    color: var(--pay-tx);
    font: 14px var(--f);
    padding: 0 2px;
    outline: 0;
    transition: border-color var(--e);
  }
  .pay-field__input:focus { border-bottom-color: var(--ac); }
  .pay-field__input::placeholder { color: var(--pay-tx2); }
  .pay-field__input--mono { font-family: var(--mono); letter-spacing: .08em; }

  .pay-row-3 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
  }

  .pay-btn {
    margin-top: 22px;
    width: 100%; height: 52px;
    background: var(--ac); color: #fff;
    border: 0; border-radius: var(--r);
    font: 700 14px var(--f);
    letter-spacing: .04em; text-transform: uppercase;
    cursor: pointer;
    transition: background var(--e), transform var(--e), box-shadow var(--e);
    font-variant-numeric: tabular-nums;
  }
  .pay-btn:hover { background: var(--ac-h); transform: translateY(-1px); box-shadow: 0 12px 28px rgba(232,59,59,.32); }
  .pay-security {
    text-align: center; margin-top: 10px;
    font-size: 11px; color: var(--pay-tx2);
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    width: 100%;
  }
</style>
</head>
<body>

<nav class="nav">
  <div class="brand-mark">T</div>
  <div class="nav__brand">Therum Commerce <small>· Atelier cart</small></div>
  <div class="nav__spacer"></div>
  <button class="nav__icon-btn" aria-label="Cart">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 4h2l2.5 12h11l2-8H6.5"/><circle cx="9" cy="20" r="1.5" fill="currentColor"/><circle cx="17" cy="20" r="1.5" fill="currentColor"/>
    </svg>
    <span class="nav__badge">3</span>
  </button>
  <button class="nav__icon-btn" aria-label="Account">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8"/>
    </svg>
  </button>
</nav>

<main class="page">
  <div class="layout">

    <!-- ─── Cart side ──────────────────────────────────────────────── -->
    <section class="cart-side">
      <header class="cart-side__head">
        <h1>Shopping Cart</h1>
        <div class="cart-side__meta">3 items</div>
      </header>

      <div class="lines">
        <div class="line">
          <div class="line__image" style="background:#1a1a1a;color:#fff">🟥</div>
          <div class="line__info">
            <div class="line__title">Therum Studio Tee</div>
            <div class="line__sku">#TS-2024-RED-LG</div>
          </div>
          <div class="qty">
            <button class="qty__btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
            <div class="qty__val">1</div>
            <button class="qty__btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
          </div>
          <div class="line__price"><span class="line__price-dollar">$</span>29.00</div>
          <button class="line__remove" aria-label="Remove">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="6" y1="18" x2="18" y2="6"/></svg>
          </button>
        </div>

        <div class="line">
          <div class="line__image" style="background:#2a2a2a;color:#fff">🧥</div>
          <div class="line__info">
            <div class="line__title">Heavyweight Hoodie</div>
            <div class="line__sku">#PF-HH-BLK-M</div>
          </div>
          <div class="qty">
            <button class="qty__btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
            <div class="qty__val">2</div>
            <button class="qty__btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
          </div>
          <div class="line__price"><span class="line__price-dollar">$</span>137.60</div>
          <button class="line__remove" aria-label="Remove">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="6" y1="18" x2="18" y2="6"/></svg>
          </button>
        </div>

        <div class="line">
          <div class="line__image" style="background:#627eea;color:#fff">🧢</div>
          <div class="line__info">
            <div class="line__title">Patch Cap</div>
            <div class="line__sku">#PP-CAP-OCN-OS</div>
          </div>
          <div class="qty">
            <button class="qty__btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
            <div class="qty__val">1</div>
            <button class="qty__btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
          </div>
          <div class="line__price"><span class="line__price-dollar">$</span>24.00</div>
          <button class="line__remove" aria-label="Remove">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="6" y1="18" x2="18" y2="6"/></svg>
          </button>
        </div>
      </div>

      <footer class="cart-side__foot">
        <button class="continue">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          Continue shopping
        </button>
        <div class="subtotal">
          Subtotal
          <span class="subtotal__value"><span class="dollar">$</span>190.60</span>
        </div>
      </footer>
    </section>

    <!-- ─── Payment side ───────────────────────────────────────────── -->
    <aside class="pay-side">

      <!-- Mock card preview, overlapping the dark panel -->
      <div class="card-mock">
        <div class="card-mock__brand">
          <span class="card-mock__brand-name">VISA</span>
          <span class="card-mock__brand-chip"><div class="red"></div><div class="yellow"></div></span>
        </div>
        <div class="card-mock__num">•••• •••• •••• ••••</div>
        <div class="card-mock__row">
          <span>YOUR NAME</span>
          <span class="card-mock__exp">12 / 28</span>
        </div>
      </div>

      <h2>Card Details</h2>

      <div class="pay-fields">
        <div class="pay-field">
          <label class="pay-field__label">Name on Card</label>
          <input class="pay-field__input" placeholder="As shown on card" />
        </div>
        <div class="pay-field">
          <label class="pay-field__label">Card Number</label>
          <input class="pay-field__input pay-field__input--mono" placeholder="1234 1234 1234 1234" />
        </div>
        <div class="pay-row-3">
          <div class="pay-field">
            <label class="pay-field__label">Expiration</label>
            <input class="pay-field__input pay-field__input--mono" placeholder="MM" />
          </div>
          <div class="pay-field">
            <label class="pay-field__label">&nbsp;</label>
            <input class="pay-field__input pay-field__input--mono" placeholder="YYYY" />
          </div>
          <div class="pay-field">
            <label class="pay-field__label">CVV</label>
            <input class="pay-field__input pay-field__input--mono" placeholder="•••" />
          </div>
        </div>
      </div>

      <button class="pay-btn">Check Out <span style="font-family:var(--mono); margin-left:6px;">$190.60</span></button>
      <div class="pay-security">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        Encrypted end-to-end
      </div>
    </aside>

  </div>
</main>

</body>
</html>
